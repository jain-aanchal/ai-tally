name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync (dev)
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest
